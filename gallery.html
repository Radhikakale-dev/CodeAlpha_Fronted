<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.filter-buttons{
    text-align:center;
    margin-bottom:20px;
}

.filter-buttons button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:5px;
    background:#333;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.filter-buttons button:hover{
    background:#555;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.image{
    overflow:hidden;
    border-radius:10px;
}

.image img{
    width:100%;
    height:220px;
    object-fit:cover;
    display:block;
    cursor:pointer;
    transition:transform 0.5s ease, filter 0.5s ease;
}

.image img:hover{
    transform:scale(1.1);
    filter:brightness(80%);
}

/* Lightbox */

#lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    z-index:1000;
}

#lightbox img{
    width:70%;
    max-height:80%;
    border-radius:10px;
}

.close{
    position:absolute;
    top:20px;
    right:35px;
    color:white;
    font-size:40px;
    cursor:pointer;
}

.prev,.next{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:30px;
    padding:10px 15px;
    border:none;
    cursor:pointer;
    background:white;
    border-radius:50%;
}

.prev{
    left:20px;
}

.next{
    right:20px;
}

@media(max-width:768px){

    #lightbox img{
        width:90%;
    }

    .prev,.next{
        font-size:22px;
    }
}
</style>

</head>
<body>

<h1>Responsive Image Gallery</h1>

<div class="filter-buttons">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('city')">City</button>
</div>

<div class="gallery">

    <div class="image nature">
        <img src="https://picsum.photos/id/1015/400/300" onclick="openLightbox(0)">
    </div>

    <div class="image city">
        <img src="https://picsum.photos/id/1011/400/300" onclick="openLightbox(1)">
    </div>

    <div class="image nature">
        <img src="https://picsum.photos/id/1016/400/300" onclick="openLightbox(2)">
    </div>

    <div class="image city">
        <img src="https://picsum.photos/id/1020/400/300" onclick="openLightbox(3)">
    </div>

    <div class="image nature">
        <img src="https://picsum.photos/id/1024/400/300" onclick="openLightbox(4)">
    </div>

    <div class="image city">
        <img src="https://picsum.photos/id/1031/400/300" onclick="openLightbox(5)">
    </div>

</div>

<!-- Lightbox -->

<div id="lightbox">

    <span class="close" onclick="closeLightbox()">&times;</span>

    <button class="prev" onclick="changeImage(-1)">❮</button>

    <img id="lightbox-img">

    <button class="next" onclick="changeImage(1)">❯</button>

</div>

<script>

let images = [
    "https://picsum.photos/id/1015/400/300",
    "https://picsum.photos/id/1011/400/300",
    "https://picsum.photos/id/1016/400/300",
    "https://picsum.photos/id/1020/400/300",
    "https://picsum.photos/id/1024/400/300",
    "https://picsum.photos/id/1031/400/300"
];

let currentIndex = 0;

function openLightbox(index){
    currentIndex = index;
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightbox-img").src = images[currentIndex];
}

function closeLightbox(){
    document.getElementById("lightbox").style.display = "none";
}

function changeImage(direction){

    currentIndex += direction;

    if(currentIndex < 0){
        currentIndex = images.length - 1;
    }

    if(currentIndex >= images.length){
        currentIndex = 0;
    }

    document.getElementById("lightbox-img").src = images[currentIndex];
}

function filterImages(category){

    let items = document.querySelectorAll(".image");

    items.forEach(item => {

        if(category === "all"){
            item.style.display = "block";
        }
        else if(item.classList.contains(category)){
            item.style.display = "block";
        }
        else{
            item.style.display = "none";
        }

    });
}

</script>

</body>
</html>
